name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # The always-on gate: the package's own tests (engines, plugin structure, profile,
  # installer, demo no-drift) on both supported dev platforms.
  unit:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm test

  # The §12 dogfood: scaffold MiniClinic, run one headless feature lap, assert the
  # verifier goes green. Dispatch-only and honest about its requirements — it needs a
  # macOS runner with the mobile toolchain (Xcode + booted simulator + Maestro) and an
  # ANTHROPIC_API_KEY secret for the `claude -p` laps. Docker is not available on GitHub
  # macOS runners, so the backend runs directly via tsx (the profile's docker-compose
  # path is for local dev). Promote to a scheduled gate once a provisioned runner exists.
  dogfood:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 60
    env:
      # Either secret works: an API key (console.anthropic.com credits) or a long-lived
      # subscription token from `claude setup-token`. Set whichever you have.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Demo no-drift check (scaffold engine reproduces the committed base)
        run: npm test -- --test-name-pattern "committed demo matches"

      - name: Installer preflight (informational — reports what the runner lacks)
        run: node installer/index.js --check
        continue-on-error: true

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Boot iOS simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | node -e "const d=JSON.parse(require('fs').readFileSync(0));console.log(Object.values(d.devices).flat().find(x=>/iPhone/.test(x.name)).udid)")
          xcrun simctl boot "$UDID"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # The boss prompt tells the agent to run `greenloop-verify` — it must be on PATH
      # (run 5: the lap burned itself discovering this and npm-installing the package).
      - name: Install greenloop CLIs on PATH
        run: npm install -g .

      # Headless claude ignores the project allowlist in an untrusted workspace;
      # pre-seed trust for the demo dir (first run surfaced this).
      - name: Trust the demo workspace for headless permissions
        run: |
          node -e '
            const fs = require("fs"), path = process.env.HOME + "/.claude.json";
            let config = {}; try { config = JSON.parse(fs.readFileSync(path)); } catch {}
            config.projects ??= {};
            for (const dir of ["${{ github.workspace }}", "${{ github.workspace }}/demo/miniclinic"]) {
              config.projects[dir] = { ...config.projects[dir], hasTrustDialogAccepted: true };
            }
            fs.writeFileSync(path, JSON.stringify(config));
          '

      # Hard gate: if a trivial claude -p can't run, the loop is pointless — and this
      # separates auth/limit failures from loop failures (run 4 had silent exit-1 laps).
      - name: Claude headless smoke test
        working-directory: demo/miniclinic
        run: |
          claude --version
          set +e
          OUT=$(claude -p "Reply with exactly: OK" --max-turns 2 2>&1)
          CODE=$?
          set -e
          echo "exit=$CODE output=$OUT"
          [ "$CODE" -eq 0 ] || exit 1

      - name: MiniClinic — install deps and start backend + Metro
        working-directory: demo/miniclinic
        run: |
          npm install
          npm run dev -w apps/backend &
          npm start -w apps/mobile &
          sleep 20
          curl -sf http://localhost:3001/health

      # Metro alone is not an app: Maestro needs com.example.miniclinic actually
      # installed on the simulator (run 5: e2e hung forever without it). Debug build
      # connects to the already-running Metro.
      - name: Build and install the app on the simulator
        working-directory: demo/miniclinic/apps/mobile
        timeout-minutes: 35
        env:
          EXPO_NO_TELEMETRY: "1"
        run: npx expo run:ios --no-bundler

      - name: Arm the task and run the headless green loop
        working-directory: demo/miniclinic
        # step timeout-minutes replaces `timeout 30m`: macOS has no GNU timeout binary
        timeout-minutes: 30
        run: |
          node -e "const f='progress.json',p=JSON.parse(require('fs').readFileSync(f));p.tasks[0].active=true;require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
          node ../../bin/greenloop-loop.js s01-patient-list 10

      - name: Wake-up ritual — fresh verify is the only trusted evidence
        working-directory: demo/miniclinic
        run: node ../../bin/greenloop-verify.js s01-patient-list

      - name: Collect evidence (verifier logs, task state, lap diff)
        if: always()
        working-directory: demo/miniclinic
        run: |
          mkdir -p /tmp/evidence
          cp -R .greenloop /tmp/evidence/ 2>/dev/null || true
          cp progress.json /tmp/evidence/ 2>/dev/null || true
          git diff > /tmp/evidence/lap-changes.diff || true
          git status --short > /tmp/evidence/git-status.txt || true

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dogfood-evidence
          path: /tmp/evidence/
          if-no-files-found: ignore
